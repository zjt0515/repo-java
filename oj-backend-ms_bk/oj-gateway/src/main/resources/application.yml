spring:
  profiles:
    active: dev
  main:
    web-application-type: reactive
  cloud:
    nacos:
      discovery:
        server-addr: nacos:8848
    gateway:
      routes:
        - id: oj-user-service
          uri: lb://oj-user-service
          predicates:
            - Path=/api/user/**
        - id: oj-question-service
          uri: lb://oj-question-service
          predicates:
            - Path=/api/question/**
        - id: oj-judge-service
          uri: lb://oj-judge-service
          predicates:
            - Path=/api/judge/**
        - id: oj-post-service
          uri: lb://oj-post-service
          predicates:
            - Path=/api/post/**
  application:
    name: oj-gateway
server:
  port: 8101
  address: 0.0.0.0
knife4j:
  gateway:
    # 开启gateway聚合组件
    enabled: true
    # 设置聚合模式采用discover服务发现的模式
    strategy: discover
    discover:
      # 聚合子服务全部为Swagger2规范的文档
      version: swagger2
#       开启discover模式
      enabled: true
      excluded-services:
        - gateway-service
