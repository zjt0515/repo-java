spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/mybatis_plus?serverTimezone=GMT%2B8&characterEncoding=utf-8&useSSL=false
    username: root
    password: 123456
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  # 设置mybatis-plus 全局配置
  global-config:
    db-config:
      table-prefix: t_
      id-type: auto
  # 配置类型别名 对应的包
  type-aliases-package: com.genshinya.mybatisplusssgdemo.pojo